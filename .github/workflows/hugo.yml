# Sample workflow for building and deploying a Hugo site to GitHub Pages
name: Build and deploy
on:
  push:
    branches:
      - main
    paths:
      - "archetypes/**"
      - "assets/**"
      - "config/**"
      - "content/**"
      - "data/**"
      - "i18n/**"
      - "layouts/**"
      - "resources/**"
      - "static/**"
      - "themes/**"
      - "go.mod"
      - "go.sum"
      - "hugo.toml"
  workflow_dispatch:
permissions:
  contents: write
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
defaults:
  run:
    shell: bash
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DART_SASS_VERSION: 1.99.0
      GO_VERSION: 1.26.1
      HUGO_VERSION: 0.160.0
      NODE_VERSION: 24.14.1
      TZ: America/New_York 
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6
      - name: Create directory for user-specific executable files
        run: |
          mkdir -p "${HOME}/.local"
      - name: Install Dart Sass
        run: |
          curl -sLJO "https://github.com/sass/dart-sass/releases/download/${DART_SASS_VERSION}/dart-sass-${DART_SASS_VERSION}-linux-x64.tar.gz"
          tar -C "${HOME}/.local" -xf "dart-sass-${DART_SASS_VERSION}-linux-x64.tar.gz"
          rm "dart-sass-${DART_SASS_VERSION}-linux-x64.tar.gz"
          echo "${HOME}/.local/dart-sass" >> "${GITHUB_PATH}"
      - name: Install Hugo
        run: |
          curl -sLJO "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
          mkdir "${HOME}/.local/hugo"
          tar -C "${HOME}/.local/hugo" -xf "hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
          rm "hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
          echo "${HOME}/.local/hugo" >> "${GITHUB_PATH}"
      - name: Verify installations
        run: |
          echo "Dart Sass: $(sass --version)"
          echo "Go: $(go version)"
          echo "Hugo: $(hugo version)"
          echo "Node.js: $(node --version)"
      - name: Install Node.js dependencies
        run: |
          [[ -f package-lock.json || -f npm-shrinkwrap.json ]] && npm ci || true
      - name: Install yq
        run: |
          sudo curl -sLo /usr/local/bin/yq "https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64"
          sudo chmod +x /usr/local/bin/yq
      - name: Configure Git
        run: |
          git config core.quotepath false
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Propagate content dates
        run: |
          BEFORE="${{ github.event.before }}"
          [[ -z "$BEFORE" || "$BEFORE" =~ ^0+$ ]] && exit 0

          NOW=$(date '+%s')
          CHANGED=$(git diff --name-only --diff-filter=ACMR "$BEFORE" HEAD -- 'content/**.md' || true)
          [ -z "$CHANGED" ] && exit 0

          for file in $CHANGED; do
            [ -f "$file" ] || continue
            [ "$(yq --front-matter=extract '.draft' "$file")" = "true" ] && continue

            NEWLY_PUBLISHED=false
            OLD=$(git show "$BEFORE:$file" 2>/dev/null) || NEWLY_PUBLISHED=true

            if [ "$NEWLY_PUBLISHED" = false ]; then
              [ "$(echo "$OLD" | yq --front-matter=extract '.draft')" = "true" ] && NEWLY_PUBLISHED=true
            fi

            if [ "$NEWLY_PUBLISHED" = true ]; then
              yq -i --front-matter=process ".date = $NOW" "$file"
            else
              yq -i --front-matter=process ".lastmod = $NOW" "$file"
            fi
          done
      - name: Cache restore
        id: cache-restore
        uses: actions/cache/restore@v5
        with:
          path: ${{ runner.temp }}/hugo_cache
          key: hugo-${{ github.run_id }}
          restore-keys:
            hugo-
      - name: Build the site
        run: |
          hugo build \
            --gc \
            --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}/" \
            --cacheDir "${{ runner.temp }}/hugo_cache"
      - name: Cache save
        id: cache-save
        uses: actions/cache/save@v5
        with:
          path: ${{ runner.temp }}/hugo_cache
          key: ${{ steps.cache-restore.outputs.cache-primary-key }}
      - name: Push date changes
        continue-on-error: true
        run: |
          git diff --quiet content/ && exit 0
          git add content/
          git commit -m "chore: propagate content dates"
          git push
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./public
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
